name: Bug
description: Something works incorrectly
title: "[bug] "
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Filing a bug. Triage will set priority/area/agent labels.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence — what's wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps to reproduce. Smallest viable repro wins.
      placeholder: |
        1. ...
        2. ...
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: "prod / stage / local; commit SHA; user/account if relevant"
  - type: textarea
    id: notes
    attributes:
      label: Notes / context
